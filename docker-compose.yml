services:
  next:
    hostname: next
    image: samirelanduk/bbc-news-archive-next:${TAG}
    build: ./next
    expose:
      - 3000
    env_file:
      - secrets.env
    environment:
      - ELASTICSEARCH_HOST=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    hostname: nginx
    image: samirelanduk/bbc-news-archive-nginx:${TAG}
    build: ./nginx
    environment:
      - VIRTUAL_HOST=${HOSTNAME}
      - LETSENCRYPT_HOST=${HOSTNAME}
    volumes:
      - snapshots:/data/snapshots:ro
    depends_on:
      - next
    restart: unless-stopped

  worker:
    hostname: worker
    image: samirelanduk/bbc-news-archive-worker:${TAG}
    build: ./worker
    command: celery -A tasks worker --loglevel=info
    env_file:
      - secrets.env
    environment:
      - ELASTICSEARCH_HOST=http://elasticsearch:9200
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672//
    volumes:
      - snapshots:/snapshots
    depends_on:
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  beat:
    hostname: beat
    image: samirelanduk/bbc-news-archive-worker:${TAG}
    command: celery -A tasks beat --loglevel=info
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672//
      - SNAPSHOT_INTERVAL_MINUTES=${SNAPSHOT_INTERVAL_MINUTES:-2}
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  rabbitmq:
    hostname: rabbitmq
    image: rabbitmq:3-management
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  elasticsearch:
    hostname: elasticsearch
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: curl -s http://localhost:9200/_cluster/health | grep -q '"status":"green"\|"status":"yellow"'
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  es_data:
  snapshots:
